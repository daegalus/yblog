name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore cached images
        id: restore-cached-images
        uses: actions/cache/restore@v4
        with:
          path: |
            public/images
            cache/images.json
          # Key on the actual source images (they live in data/content/images, not
          # data/content/blog/images — the old glob matched nothing). restore-keys
          # falls back to the most recent cache so a single changed image doesn't
          # discard everything; the build's per-image hash check re-encodes only what changed.
          key: images-${{ hashFiles('data/content/images/**') }}
          restore-keys: |
            images-

      - name: Download Earthdate
        id: download-earthdate
        run: wget -O earthdate https://github.com/daegalus/earthdate/releases/latest/download/earthdate-linux-x86_64

      - name: Fix Permissions
        run: chmod +x earthdate

      - name: Get earthdate
        id: earthdate
        run: echo "earthdate=$(./earthdate)" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@v5
        with:
          go-version: stable
      
      - name: "Build"
        run: go run yblog.go deploy

      - name: Save image cache
        id: save-image-cache
        uses: actions/cache/save@v4
        with:
          path: |
            public/images
            cache/images.json
          key: ${{ steps.restore-cached-images.outputs.cache-primary-key }}
  

      - name: "Compress"
        # Archive the dir itself, not public/* — the shell glob skips dotfiles,
        # which would drop passthrough entries like public/.well-known from the release.
        run: tar -cJf website.tar.zst public

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.earthdate.outputs.earthdate }}
          tag_name: ${{ steps.earthdate.outputs.earthdate }}
          files: |
            website.tar.zst

      - name: "Post Request to Statichost.eu builder"
        run: |
          curl -X POST https://builder.statichost.eu/digital-garden

